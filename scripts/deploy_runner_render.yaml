services:
  - type: web
    name: gem-bid-runner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webhook_runner:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEM_RUNNER_TOKEN
        sync: false
