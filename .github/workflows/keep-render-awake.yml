name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dashboard
        run: |
          set -euo pipefail
          response="$(curl -fsS "https://gem-bid-extractor.onrender.com/api/health")"
          python -c "import json,sys; data=json.loads(sys.argv[1]); assert data.get('status')=='ok', data" "$response"
