name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dashboard
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            response="$(curl -fsS --max-time 20 "https://gem-bid-extractor.onrender.com/api/health" || true)"
            if [ -n "$response" ] && python -c "import json,sys; data=json.loads(sys.argv[1]); assert data.get('status')=='ok'" "$response"; then
              echo "Health ping succeeded on attempt $attempt"
              exit 0
            fi
            sleep 10
          done
          echo "Health ping failed after retries"
          exit 1
