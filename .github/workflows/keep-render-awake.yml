name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dashboard
        run: |
          set -euo pipefail
          curl -fsS "https://gem-bid-extractor.onrender.com/api/bids?tab=extracted" >/dev/null
