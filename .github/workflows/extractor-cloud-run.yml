name: Extractor Cloud Run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-extractor:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      ANTHROPIC_BASE_URL: https://api.anthropic.com
      ANTHROPIC_DNS_CACHE_TTL_SECONDS: "21600"
      SUPABASE_DB_DSN: ${{ secrets.SUPABASE_DB_DSN }}
      SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
      SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
      SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
      SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_SSLMODE: require
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run extractor
        run: python main.py

      - name: Commit updated Excel outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/Extracted_bids.xlsx output/doubtful_bids.xlsx || true
          if git diff --cached --quiet; then
            echo "No output changes to commit"
          else
            git commit -m "Cloud run output update"
            git push origin main
          fi
